version: '3'

services:

  mariadb:
    container_name: mariadb
    build:
      context: requirements/mariadb
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - mariadb:/var/lib/mysql
    networks:
      - inception
    restart: unless-stopped
    expose:
      - "3306"

  wordpress:
    container_name: wordpress
    build:
      context: requirements/wordpress
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - wordpress:/var/www/wordpress
    networks:
      - inception
    depends_on:
      - mariadb
    restart: unless-stopped
    expose:
      - "9000"

  nginx:
    container_name: nginx
    build:
      context: requirements/nginx
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - wordpress:/var/www/wordpress
    networks:
      - inception
    depends_on:
      - wordpress
    ports:
      - "443:443"
      - "8080:8080"
    restart: unless-stopped

  adminer:
    container_name: adminer
    build:
      context: requirements/bonus/adminer
      dockerfile: Dockerfile
    networks:
      - inception
    depends_on:
      - mariadb
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      - adminer:/var/www/html

  website:
    container_name: website
    build:
      context: requirements/bonus/website
      dockerfile: Dockerfile
    networks:
      - inception
    ports:
      - "80:80"
    restart: unless-stopped

  redis:
    container_name: redis
    build:
      context: requirements/bonus/redis
      dockerfile: Dockerfile
    networks:
      - inception
    restart: unless-stopped
    expose:
      - "6379"

volumes:
  wordpress:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/hazali/data/wordpress

  mariadb:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/hazali/data/mariadb

  adminer:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/hazali/data/adminer
networks:
  inception:
    driver: bridge
